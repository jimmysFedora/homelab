apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/linkwarden
configMapGenerator:
  - name: linkwarden-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: linkwarden-values
            valuesKey: values.yaml
    target:
      kind: HelmRelease
      name: linkwarden