apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/immich
  - immich-sealed-secret.yaml
  - ./database
  - ./storage
configMapGenerator:
  - name: immich-values
    namespace: default
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: immich-values
            valuesKey: values.yaml
    target:
      kind: HelmRelease
      name: immich