apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: prod-
namespace: default
resources:
  - ../../base
  - pvc.yaml
configMapGenerator:
  - name: actual-budget-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: prod-actual-budget-values
            valuesKey: values.yaml
    target:
      kind: HelmRelease
      name: actual-budget