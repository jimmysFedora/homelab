apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base/actualbudget
  - pvc.yaml
configMapGenerator:
  - name: actual-budget-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: actual-budget-values
            valuesKey: values.yaml
    target:
      kind: HelmRelease
      name: actual-budget