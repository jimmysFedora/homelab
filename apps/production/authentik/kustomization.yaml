apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: prod-
namespace: default
resources:
  - ../../base/authentik
  - authentik-postgres-deployment.yaml
  - authentik-postgres-pvc.yaml
  - authentik-postgres-svc.yaml
  # - authentik-sealed-secret.yaml
configMapGenerator:
  - name: authentik-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: replace
        path: /metadata/name
        value: authentik-secrets
    target:
      kind: SealedSecret
      name: prod-authentik-secrets
  - patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: prod-authentik-values
            valuesKey: values.yaml
    target:
      kind: HelmRelease
      name: authentik