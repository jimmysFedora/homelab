apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prod-authentik-postgresql
  namespace: default
spec:
  serviceName: authentik-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
      nodeSelector:
        kubernetes.io/hostname: debian-kg4
      containers:
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: "authentik"
            - name: POSTGRES_USER
              value: "authentik"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "authentik-secrets"
                  key: "DB_PASS"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: "/var/lib/postgresql/data"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: "authentik-db-local-pvc"