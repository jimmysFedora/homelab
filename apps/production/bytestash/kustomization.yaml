apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: prod-
namespace: default
resources:
  - bytestash-pvc.yaml
  - ../../base/bytestash
configMapGenerator:
  - name: bytestash-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: prod-bytestash-values
            valuesKey: values.yaml
    target:
      kind: HelmRelease
      name: bytestash