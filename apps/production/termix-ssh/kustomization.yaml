# ---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: prod-
namespace: default
resources:
  - termix-ssh-pvc.yaml
  - ../../base/termix-ssh
configMapGenerator:
  - name: termix-ssh-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: prod-termix-ssh-values
            valuesKey: values.yaml
    target:
      kind: HelmRelease
      name: termix-ssh