apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: flux-system
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: jellyfin
      version: '3.2.0'
      sourceRef:
        kind: HelmRepository
        name: jellyfin
        namespace: flux-system
      interval: 5m
  valuesFrom: []
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3