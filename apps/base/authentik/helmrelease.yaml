apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: authentik
      version: '2026.2.1'
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  valuesFrom: []
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5