apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual-budget
  namespace: flux-system
spec:
  interval: 15m
  timeout: 5m
  chart:
    spec:
      chart: actualbudget
      version: '1.8.7'
      sourceRef:
        kind: HelmRepository
        name: actual-budget
        namespace: flux-system
      interval: 5m
  valuesFrom: []
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: true