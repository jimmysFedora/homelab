apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: development
resources:
  - ../../base/it-tools
configMapGenerator:
  - name: it-tools-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: it-tools-values
            valuesKey: values.yaml
    target:
      kind: HelmRelease
      name: it-tools