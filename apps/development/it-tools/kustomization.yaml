apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: dev-
namespace: default
resources:
  - ../../base/it-tools
configMapGenerator:
  - name: it-tools-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: add
        path: /spec/valuesFrom
        value:
          - kind: ConfigMap
            name: dev-it-tools-values
            valuesKey: values.yaml
    target:
      kind: HelmRelease
      name: it-tools