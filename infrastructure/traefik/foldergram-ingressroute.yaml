apiVersion: v1
kind: Service
metadata:
  name: foldergram
  namespace: default
spec:
  ports:
  - port: 4141
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: foldergram
  namespace: default
subsets:
- addresses:
  - ip: 192.168.1.213
  ports:
  - port: 4141
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: foldergram-ingressroute
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`foldergram.mistyfumes.dev`)
    kind: Rule
    services:
    - name: foldergram
      port: 4141
  tls:
    secretName: prod-mistyfumes-tls