apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: default
spec:
  ports:
  - name: http
    port: 3000
    protocol: TCP
  - name: ssh
    port: 2222
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: gitea
  namespace: default
subsets:
- addresses:
  - ip: 192.168.1.213
  ports:
  - name: http
    port: 3000
  - name: ssh
    port: 2222
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gitea-ingressroute
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`gitea-demo-1.mistyfumes.dev`)
    kind: Rule
    services:
    - name: gitea
      port: 3000
      serversTransport: insecure-transport
  tls:
    secretName: dev-mistyfumes-tls
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: gitea-ssh
  namespace: default
spec:
  entryPoints:
    - ssh
  routes:
  - match: HostSNI(`*`)
    services:
    - name: gitea
      port: 2222