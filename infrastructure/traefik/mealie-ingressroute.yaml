apiVersion: v1
kind: Service
metadata:
  name: mealie
  namespace: default
spec:
  ports:
  - port: 9925
    protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: mealie
  namespace: default
subsets:
- addresses:
  - ip: 192.168.1.213
  ports:
  - port: 9925
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mealie-ingressroute
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`open-webui.dev.mistyfumes.dev`)
    kind: Rule
    services:
    - name: mealie
      port: 9925
      scheme: https
      serversTransport: insecure-transport
  tls:
    secretName: prod-mistyfumes-tls