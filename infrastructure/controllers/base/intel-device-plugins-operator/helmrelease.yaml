apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-operator
  namespace: inteldeviceplugins-system
spec:
  interval: 10m
  chart:
    spec:
      chart: intel-device-plugins-operator
      version: "0.35.0"
      sourceRef:
        kind: HelmRepository
        name: intel-device-plugins-operator
        namespace: inteldeviceplugins-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  valuesFrom: []