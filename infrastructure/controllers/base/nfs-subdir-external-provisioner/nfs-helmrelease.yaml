apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nfs-subdir-external-provisioner
  namespace: flux-system
spec:
  releaseName: nfs-subdir-external-provisioner
  interval: 10m
  chart:
    spec:
      chart: nfs-subdir-external-provisioner
      version: "4.0.18"
      sourceRef:
        kind: HelmRepository
        name: nfs-subdir-external-provisioner
        namespace: flux-system
      interval: 1m
  install:
    remediation:
      retries: 3
  values:
    nfs:
      server: 192.168.1.130
      path: /mnt/octaPool/k8s-storage
    storageClass:
      defaultClass: false