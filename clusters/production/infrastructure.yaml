apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-sources
  namespace: flux-system
spec:
  interval: 1h
  path: ./infrastructure/sources
  sourceRef:
    kind: GitRepository
    name: flux-system
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-traefik
  namespace: flux-system
spec:
  interval: 1h
  path: ./infrastructure/traefik # ingress routes for non-kubernetes services
  sourceRef:
    kind: GitRepository
    name: flux-system
  prune: true
---
