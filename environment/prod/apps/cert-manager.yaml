apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-infra
  namespace: flux-system
spec:
  interval: 10m
  path: ./kubernetes/infrastructure/cert-manager/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m