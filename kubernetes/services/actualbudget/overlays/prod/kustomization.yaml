apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: prod-
namespace: default
resources:
  - ../../base
  - pvc.yaml
configMapGenerator:
  - name: actual-budget-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true
patches:
  - patch: |-
      - op: replace
        path: /spec/valuesFrom/0/name
        value: prod-actual-budget-values
    target:
      kind: HelmRelease
      name: actual-budget