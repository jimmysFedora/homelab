services:
  syncthing:
    image: ghcr.io/linuxserver/syncthing:v2.0.15-ls211@sha256:befb3dc3efac8987270fa6fa99d9594a0dc2a11662b720a296453e162a274149
    container_name: syncthing
    hostname: syncthing
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - /mnt/docker-nfs/volumes/syncthing-data/config:/config
      - /mnt/docker-nfs/volumes/syncthing-data/data:/data
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    restart: unless-stopped