services:
  beszel:
    image: henrygd/beszel:0.18.6@sha256:3135185161e072a5058f7c05b247345072bd9f3e23a4a9cd8c879880b085bc41
    container_name: beszel
    restart: unless-stopped
    # ports:
    #   - 8090:8090
    environment:
      APP_URL: https://beszel.mistyfumes.dev
    volumes:
      - /mnt/docker-nfs/volumes/beszel-data/beszel_data:/beszel_data
      - /mnt/docker-nfs/volumes/beszel-data/beszel_socket:/beszel_socket
    labels:
      - traefik.enable=true
      - traefik.http.routers.beszel-insecure.rule=Host(`beszel.mistyfumes.dev`)
      - traefik.http.routers.beszel-insecure.entrypoints=http
      - traefik.http.routers.beszel-insecure.middlewares=https-redirect@file
      - traefik.http.routers.beszel-secure.rule=Host(`beszel.mistyfumes.dev`)
      - traefik.http.routers.beszel-secure.entrypoints=https
      - traefik.http.routers.beszel-secure.tls=true
      - traefik.http.routers.beszel-secure.tls.certresolver=cloudflare
      - traefik.http.services.beszel.loadbalancer.server.port=8090
    networks:
      - frontend

  beszel-agent:
    image: henrygd/beszel-agent:0.18.6@sha256:bd0caeb8fe3c52f5099d931467adc84f7427f333b8122337e4e1a861e7b1490a
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /mnt/docker-nfs/volumes/beszel-data/beszel_agent_data:/var/lib/beszel-agent
      - /mnt/docker-nfs/volumes/beszel-data/beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: https://beszel.mistyfumes.dev
      TOKEN: ${TOKEN}
      KEY: ${KEY}

networks:
  frontend:
    external: true