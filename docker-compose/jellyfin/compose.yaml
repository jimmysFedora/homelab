services:
  jellyfin:
    image: linuxserver/jellyfin:10.11.7@sha256:200e4b4b02bb26725e38b90160c8b648bb9f6a69f62b64cb38798d4e8d85e8b7
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
    volumes:
      - /mnt/docker-nfs/volumes/jellyfin-data:/config
      - /mnt/octapool-nfs/blu-ray:/data/blu-ray
      - /mnt/octapool-nfs/dvds:/data/dvds
      - /mnt/octapool-nfs/tv:/data/tv
    # ports:
    #   - 8096:8096
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - /dev/dri/renderD128:/dev/dri/renderD128
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin-insecure.rule=Host(`jellyfin.mistyfumes.dev`)"
      - "traefik.http.routers.jellyfin-insecure.entrypoints=http"
      - "traefik.http.routers.jellyfin-insecure.middlewares=https-redirect@file"
      - "traefik.http.routers.jellyfin-secure.rule=Host(`jellyfin.mistyfumes.dev`)"
      - "traefik.http.routers.jellyfin-secure.entrypoints=https"
      - "traefik.http.routers.jellyfin-secure.tls=true"
      - "traefik.http.routers.jellyfin-secure.tls.certresolver=cloudflare"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    networks:
      - frontend
      - newt-jellyfin

  newt:
    image: ghcr.io/fosrl/newt:1.10.4@sha256:ccd2b0e9a0492d7492c00dff1295d0c487a2f71f9f8fc80b1c61e597f5181aed
    container_name: newt-jellyfin
    restart: unless-stopped
    environment:
      - PANGOLIN_ENDPOINT=${PANGOLIN_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
    networks:
      - newt-jellyfin

networks:
  frontend:
    external: true
  newt-jellyfin:
      driver: bridge