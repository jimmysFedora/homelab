services:
  server:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: always
    volumes:
      - /mnt/docker-nfs/volumes/forgejo-data/forgejo:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      # - '3000:3000'
      - '222:22'
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forgejo-insecure.rule=Host(`forgejo.mistyfumes.dev`)"
      - "traefik.http.routers.forgejo-insecure.entrypoints=http"
      - "traefik.http.routers.forgejo-insecure.middlewares=https-redirect@file"
      - "traefik.http.routers.forgejo-secure.rule=Host(`forgejo.mistyfumes.dev`)"
      - "traefik.http.routers.forgejo-secure.entrypoints=https"
      - "traefik.http.routers.forgejo-secure.tls=true"
      - "traefik.http.routers.forgejo-secure.tls.certresolver=cloudflare"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3000"
    networks:
      - frontend

  docker-in-docker:
    image: docker:dind
    container_name: 'docker_dind'
    privileged: 'true'
    command: ['dockerd', '-H', 'tcp://0.0.0.0:2375', '--tls=false']
    restart: 'unless-stopped'

  forgejo-runner:
    image: 'data.forgejo.org/forgejo/runner:12.8.0'
    links:
      - docker-in-docker
    depends_on:
      docker-in-docker:
        condition: service_started
    container_name: 'runner'
    environment:
      DOCKER_HOST: tcp://docker-in-docker:2375
    # User without root privileges, but with access to `./data`.
    user: 1001:1001
    volumes:
      - /mnt/docker-nfs/volumes/forgejo-data/data:/data
    restart: 'unless-stopped'

    command: '/bin/sh -c "sleep 5; forgejo-runner daemon"'

networks:
  frontend:
    external: true