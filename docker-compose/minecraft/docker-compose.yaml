services:
  mc:
    image: itzg/minecraft-server:java25@sha256:ca02da99646d1d670a591f0694c683b8e81224d27e8430bd058db435a0939382
    pull_policy: daily
    tty: true
    stdin_open: true
    ports:
      - 25565:25565
    environment:
      EULA: "TRUE"
      MEMORY: "4096M"
      MAX_PLAYERS: "5"
      MOTD: "Future home of placing blocs and shi?"
      ICON: "https://i.imgur.com/Qx3XL5o.png"
      USE_MEOWICE_FLAGS: "true"
      DIFFICULTY: "3"
      VERSION: "1.21.11"
    volumes:
      - /mnt/docker-nfs/volumes/minecraft-data:/data

  newt:
    image: ghcr.io/fosrl/newt:1.10.4@sha256:ccd2b0e9a0492d7492c00dff1295d0c487a2f71f9f8fc80b1c61e597f5181aed
    container_name: newt-minecraft
    restart: unless-stopped
    environment:
      - PANGOLIN_ENDPOINT=${PANGOLIN_ENDPOINT}
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}